name: OSV-Scanner

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  schedule:
    - cron: "23 5 * * 3"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-sbom:
    name: Build CycloneDX SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Java 25
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Generate SBOM
        run: ./mvnw -B -ntp -nsu -Psbom -DskipTests package

      - name: Upload aggregate SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cyclonedx-sbom
          path: target/bom.json
          if-no-files-found: error
          retention-days: 5

  scan:
    name: Scan SBOM / osv-scan
    needs: build-sbom
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Download aggregate SBOM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cyclonedx-sbom
          path: .

      - name: Scan SBOM
        shell: bash
        run: |
          docker run --rm \
            --volume "${PWD}:/src" \
            ghcr.io/google/osv-scanner@sha256:5116601dedc01c1c580eb92371883ec052fc4c13c3fbc109d621a63ac416d475 \
            scan \
            -L /src/bom.json \
            --format sarif \
            --output-file /src/osv-results.sarif

      - name: Upload OSV results artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: osv-scanner-results
          path: osv-results.sarif
          retention-days: 5
          if-no-files-found: error

      - name: Upload OSV results to code scanning
        if: ${{ always() }}
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: osv-results.sarif
