name: Release

on:
  push:
    branches:
      - master
    paths:
      - pom.xml
      - api/pom.xml
      - rsql-spi/pom.xml
      - core/pom.xml
      - jpa-validation/pom.xml
      - perplexhub/pom.xml
      - spring-boot-starter/pom.xml
      - integration/pom.xml
      - CHANGELOG.md
      - .github/release/jreleaser.yml
      - .github/release/release-please-config.json
      - .github/release/release-please-manifest.json
      - .github/workflows/release.yml
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, without v prefix. Leave empty to use pom.xml."
        required: false
      dry_run:
        description: "Run verification, staging, and JReleaser dry-run without tagging or publishing."
        type: boolean
        default: false
      allow_existing_tag:
        description: "Continue if the release tag already exists and points at this commit."
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release Maven Central
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      attestations: write
      contents: write
      id-token: write
      packages: write
    env:
      CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
      CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
      JRELEASER_MAVENCENTRAL_SONATYPE_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
      JRELEASER_MAVENCENTRAL_SONATYPE_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
      JRELEASER_GITHUB_TOKEN: ${{ github.token }}
      JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.JRELEASER_GPG_PUBLIC_KEY }}
      JRELEASER_GPG_SECRET_KEY: ${{ secrets.JRELEASER_GPG_SECRET_KEY }}
      JRELEASER_GPG_PASSPHRASE: ${{ secrets.JRELEASER_GPG_PASSPHRASE }}
      RELEASE_GIT_USER_NAME: ${{ vars.RELEASE_GIT_USER_NAME }}
      RELEASE_GIT_USER_EMAIL: ${{ vars.RELEASE_GIT_USER_EMAIL }}
      REQUESTED_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
      ALLOW_EXISTING_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.allow_existing_tag || false }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Java 25
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Resolve release
        id: release
        shell: bash
        run: |
          set -euo pipefail

          version="$(./mvnw -q -DforceStdout help:evaluate -Dexpression=project.version)"
          if [[ -n "${REQUESTED_VERSION}" && "${REQUESTED_VERSION}" != "${version}" ]]; then
            echo "::error::Requested version ${REQUESTED_VERSION} does not match pom.xml version ${version}."
            exit 1
          fi

          if [[ "${version}" == *-SNAPSHOT ]]; then
            {
              echo "release=false"
              echo "version=${version}"
            } >> "$GITHUB_OUTPUT"
            echo "::notice::pom.xml is at ${version}; skipping release publication."
            exit 0
          fi

          tag="v${version}"
          tag_exists=false
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            tag_exists=true
          fi

          if [[ "${tag_exists}" == "true" && "${ALLOW_EXISTING_TAG}" != "true" ]]; then
            {
              echo "release=false"
              echo "version=${version}"
              echo "tag=${tag}"
            } >> "$GITHUB_OUTPUT"
            echo "::notice::${tag} already exists; skipping publication."
            exit 0
          fi

          if [[ "${tag_exists}" == "true" ]]; then
            git fetch --force origin "refs/tags/${tag}:refs/tags/${tag}"
            tag_commit="$(git rev-list -n 1 "${tag}")"
            head_commit="$(git rev-parse HEAD)"
            if [[ "${tag_commit}" != "${head_commit}" ]]; then
              echo "::error::${tag} points at ${tag_commit}, but this workflow is running ${head_commit}."
              exit 1
            fi
          fi

          {
            echo "release=true"
            echo "version=${version}"
            echo "tag=${tag}"
            echo "tag_exists=${tag_exists}"
          } >> "$GITHUB_OUTPUT"

      - name: Validate release metadata
        if: steps.release.outputs.release == 'true'
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.release.outputs.version }}"
          grep -Eq "^## \\[?${version}\\]?" CHANGELOG.md

          missing=0
          for name in \
            CENTRAL_PORTAL_USERNAME \
            CENTRAL_PORTAL_PASSWORD \
            JRELEASER_GPG_PUBLIC_KEY \
            JRELEASER_GPG_SECRET_KEY \
            JRELEASER_GPG_PASSPHRASE
          do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::${name} is not configured."
              missing=1
            fi
          done

          if [[ "${missing}" != "0" ]]; then
            exit 1
          fi

      - name: Verify release build
        if: steps.release.outputs.release == 'true'
        run: ./mvnw -B -ntp -nsu -Pcoverage,release,sbom,reproducible verify

      - name: Stage Maven artifacts
        if: steps.release.outputs.release == 'true'
        run: |
          rm -rf target/staging-deploy
          ./mvnw -B -ntp -nsu -Ppublication,sbom,reproducible -DskipTests deploy

      - name: Inspect staged artifacts
        if: steps.release.outputs.release == 'true'
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.release.outputs.version }}"
          group_dir="target/staging-deploy/io/github/ggomarighetti"
          parent_dir="${group_dir}/rsql-jpa-search-parent/${version}"
          test -f "${parent_dir}/rsql-jpa-search-parent-${version}.pom"

          artifacts=(
            rsql-jpa-search-api
            rsql-jpa-search-rsql-spi
            rsql-jpa-search-core
            rsql-jpa-search-jpa-validation
            rsql-jpa-search-perplexhub
            rsql-jpa-search-spring-boot-starter
          )
          for artifact in "${artifacts[@]}"; do
            artifact_dir="${group_dir}/${artifact}/${version}"
            test -f "${artifact_dir}/${artifact}-${version}.pom"
            test -f "${artifact_dir}/${artifact}-${version}.jar"
            test -f "${artifact_dir}/${artifact}-${version}-sources.jar"
            test -f "${artifact_dir}/${artifact}-${version}-javadoc.jar"
            test -f "${artifact_dir}/${artifact}-${version}-cyclonedx.json"
          done

          unpublished=(
            jpa-rsql-search
            jpa-rsql-search-parent
            jpa-rsql-search-api
            jpa-rsql-search-rsql-spi
            jpa-rsql-search-core
            jpa-rsql-search-jpa-validation
            jpa-rsql-search-perplexhub
            jpa-rsql-search-spring-boot-starter
            jpa-rsql-search-integration-tests
            rsql-jpa-search
            rsql-jpa-search-integration-tests
          )
          for artifact in "${unpublished[@]}"; do
            test ! -e "${group_dir}/${artifact}/${version}"
          done
          find "${group_dir}" -type f | sort

      - name: Prepare release evidence
        if: steps.release.outputs.release == 'true'
        id: evidence
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.release.outputs.version }}"
          mkdir -p release-assets
          cp target/bom.json "release-assets/rsql-jpa-search-${version}-aggregate-cyclonedx.json"
          cp "target/rsql-jpa-search-parent-${version}.buildinfo" \
            "release-assets/rsql-jpa-search-${version}.buildinfo"

          find target/staging-deploy -type f -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            > "release-assets/rsql-jpa-search-${version}-SHA256SUMS"

      - name: Sign release checksum manifest
        if: steps.release.outputs.release == 'true'
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.release.outputs.version }}"
          install -m 700 -d ~/.gnupg
          printf '%s' "${JRELEASER_GPG_SECRET_KEY}" | gpg --batch --import
          key_fingerprint="$(gpg --batch --list-secret-keys --with-colons | awk -F: '/^fpr:/ {print $10; exit}')"
          if [[ -z "${key_fingerprint}" ]]; then
            echo "::error::Could not resolve imported GPG key fingerprint."
            exit 1
          fi

          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "${JRELEASER_GPG_PASSPHRASE}" \
            --armor \
            --detach-sign \
            --local-user "${key_fingerprint}" \
            --output "release-assets/rsql-jpa-search-${version}-SHA256SUMS.asc" \
            "release-assets/rsql-jpa-search-${version}-SHA256SUMS"
          gpg --armor --export "${key_fingerprint}" \
            > "release-assets/rsql-jpa-search-release-public-key.asc"

      - name: Attest release provenance
        if: steps.release.outputs.release == 'true' && env.DRY_RUN != 'true'
        id: provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-checksums: release-assets/rsql-jpa-search-${{ steps.release.outputs.version }}-SHA256SUMS
          create-storage-record: false

      - name: Attest aggregate SBOM
        if: steps.release.outputs.release == 'true' && env.DRY_RUN != 'true'
        id: sbom-attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-checksums: release-assets/rsql-jpa-search-${{ steps.release.outputs.version }}-SHA256SUMS
          sbom-path: release-assets/rsql-jpa-search-${{ steps.release.outputs.version }}-aggregate-cyclonedx.json
          create-storage-record: false

      - name: Collect Sigstore bundles
        if: steps.release.outputs.release == 'true' && env.DRY_RUN != 'true'
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.release.outputs.version }}"
          cp "${{ steps.provenance.outputs.bundle-path }}" \
            "release-assets/rsql-jpa-search-${version}-provenance.sigstore.json"
          cp "${{ steps.sbom-attestation.outputs.bundle-path }}" \
            "release-assets/rsql-jpa-search-${version}-sbom.sigstore.json"

      - name: Validate JReleaser configuration
        if: steps.release.outputs.release == 'true'
        run: ./mvnw -B -ntp -nsu -N jreleaser:config

      - name: JReleaser dry-run
        if: steps.release.outputs.release == 'true'
        run: ./mvnw -B -ntp -nsu -N jreleaser:deploy -Djreleaser.dry.run=true

      - name: Create signed tag
        if: steps.release.outputs.release == 'true' && env.DRY_RUN != 'true' && steps.release.outputs.tag_exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          install -m 700 -d ~/.gnupg
          printf '%s' "${JRELEASER_GPG_SECRET_KEY}" | gpg --batch --import
          key_fingerprint="$(gpg --batch --list-secret-keys --with-colons | awk -F: '/^fpr:/ {print $10; exit}')"
          if [[ -z "${key_fingerprint}" ]]; then
            echo "::error::Could not resolve imported GPG key fingerprint."
            exit 1
          fi

          gpg_wrapper="${RUNNER_TEMP}/gpg-wrapper"
          cat > "${gpg_wrapper}" <<'SCRIPT'
          #!/usr/bin/env bash
          exec gpg --batch --yes --pinentry-mode loopback --passphrase "${JRELEASER_GPG_PASSPHRASE}" "$@"
          SCRIPT
          chmod 700 "${gpg_wrapper}"

          git config user.name "${RELEASE_GIT_USER_NAME:-Guillermo Orue Marighetti}"
          git config user.email "${RELEASE_GIT_USER_EMAIL:-actions@users.noreply.github.com}"
          git config user.signingkey "${key_fingerprint}"
          git config gpg.program "${gpg_wrapper}"
          git config tag.gpgsign true

          tag="${{ steps.release.outputs.tag }}"
          git tag -s "${tag}" -m "rsql-jpa-search ${tag}"
          git tag -v "${tag}"
          gh auth setup-git
          git push origin "${tag}"

      - name: Publish to GitHub Packages
        if: steps.release.outputs.release == 'true' && env.DRY_RUN != 'true'
        run: ./mvnw -B -ntp -nsu -Ppublication -DskipTests "-DaltDeploymentRepository=github::default::https://maven.pkg.github.com/${{ github.repository }}" deploy
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ github.token }}

      - name: Publish to Maven Central
        if: steps.release.outputs.release == 'true' && env.DRY_RUN != 'true'
        run: ./mvnw -B -ntp -nsu -N jreleaser:deploy

      - name: Extract release notes
        if: steps.release.outputs.release == 'true' && env.DRY_RUN != 'true'
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.release.outputs.version }}"
          awk -v version="${version}" '
            $0 ~ "^## \\[?" version "\\]?" { found = 1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md

          if [[ ! -s release-notes.md ]]; then
            echo "See CHANGELOG.md for release notes." > release-notes.md
          fi

      - name: Create or update GitHub Release
        if: steps.release.outputs.release == 'true' && env.DRY_RUN != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.release.outputs.tag }}"
          title="rsql-jpa-search modular v2 ${tag}"
          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release edit "${tag}" --title "${title}" --notes-file release-notes.md --latest
          else
            gh release create "${tag}" --title "${title}" --notes-file release-notes.md --latest
          fi
          gh release upload "${tag}" release-assets/* --clobber

      - name: Create version branch
        if: steps.release.outputs.release == 'true' && env.DRY_RUN != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.release.outputs.version }}"
          tag="${{ steps.release.outputs.tag }}"
          git fetch --force origin "refs/tags/${tag}:refs/tags/${tag}"
          tag_commit="$(git rev-list -n 1 "${tag}")"
          branch_ref="refs/heads/${version}"
          branch_commit="$(git ls-remote --heads origin "${branch_ref}" | awk '{print $1}')"

          if [[ -n "${branch_commit}" ]]; then
            if [[ "${branch_commit}" != "${tag_commit}" ]]; then
              echo "::error::Version branch ${version} points at ${branch_commit}, but ${tag} points at ${tag_commit}."
              exit 1
            fi
            echo "::notice::Version branch ${version} already points at ${tag}."
            exit 0
          fi

          gh api "repos/${GITHUB_REPOSITORY}/git/refs" \
            --method POST \
            --field ref="${branch_ref}" \
            --field sha="${tag_commit}"

      - name: Release summary
        if: steps.release.outputs.release == 'true'
        shell: bash
        run: |
          {
            echo "## Release"
            echo ""
            echo "- Version: ${{ steps.release.outputs.version }}"
            echo "- Tag: ${{ steps.release.outputs.tag }}"
            echo "- Dry run: ${DRY_RUN}"
            echo "- Existing tag: ${{ steps.release.outputs.tag_exists }}"
            echo "- Parent plus public modules: staged atomically"
            echo "- CycloneDX SBOMs: attached to Maven artifacts"
            echo "- SHA-256 manifest: signed with the release PGP key"
            echo "- Provenance and SBOM attestations: signed with Sigstore"
            echo "- SHA-256 manifest and buildinfo: attached to the GitHub release"
            echo "- Retired jpa-rsql-search coordinates: not generated"
            echo "- rsql-jpa-search integration and monolithic coordinates: not generated"
            echo "- Maven Central: published when dry run is false"
            echo "- GitHub Packages: published when dry run is false"
            echo "- Version branch: ${{ steps.release.outputs.version }} when dry run is false"
          } >> "$GITHUB_STEP_SUMMARY"
