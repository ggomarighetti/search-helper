name: Release Please

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - name: Check bootstrap release tag
        id: bootstrap
        shell: bash
        run: |
          if git ls-remote --exit-code --tags \
            "https://github.com/${{ github.repository }}.git" \
            refs/tags/v1.0.0 >/dev/null 2>&1; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::v1.0.0 does not exist yet; release-please is disabled until the bootstrap release is published."
          fi

      - name: Release Please
        if: steps.bootstrap.outputs.ready == 'true'
        uses: googleapis/release-please-action@8b8fd2cc23b2e18957157a9d923d75aa0c6f6ad5
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
