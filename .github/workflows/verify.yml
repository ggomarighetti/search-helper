name: Verify

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  MAVEN_ARGS: -B -ntp -nsu

jobs:
  verify:
    name: Verify (Java 25)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: read
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Verify
        if: github.event_name != 'workflow_dispatch' && github.event_name != 'schedule'
        run: ./mvnw $MAVEN_ARGS -Pcoverage verify

      - name: Verify release profile
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
        run: ./mvnw $MAVEN_ARGS -Pcoverage,release verify

      - name: Upload test and coverage artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: test-and-coverage-reports
          path: |
            target/site/jacoco/
            target/surefire-reports/
            target/failsafe-reports/
          if-no-files-found: ignore

      - name: Skip Codecov uploads
        if: ${{ env.CODECOV_TOKEN == '' }}
        run: echo "CODECOV_TOKEN secret is not configured; skipping Codecov uploads."

      - name: Upload coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@a99c28d3f0da835de33ff2feb2e15691c7b9641f
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: target/site/jacoco/jacoco.xml
          disable_search: true
          flags: java
          name: java-coverage
          fail_ci_if_error: true

      - name: Upload test results to Codecov
        if: ${{ !cancelled() && env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@a99c28d3f0da835de33ff2feb2e15691c7b9641f
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: target/surefire-reports/*.xml,target/failsafe-reports/*.xml
          disable_search: true
          report_type: test_results
          flags: java
          name: java-tests
          fail_ci_if_error: true

      - name: SonarQube Cloud analysis
        if: ${{ env.SONAR_TOKEN != '' }}
        run: ./mvnw $MAVEN_ARGS sonar:sonar

      - name: Skip SonarQube Cloud analysis
        if: ${{ env.SONAR_TOKEN == '' }}
        run: echo "SONAR_TOKEN secret is not configured; skipping SonarQube Cloud analysis."

  compatibility:
    name: Compatibility (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        java: ["17", "21"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Test
        run: ./mvnw $MAVEN_ARGS test
