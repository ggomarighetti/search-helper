name: Verify

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (Java 25)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: read
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Java 25
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Verify
        if: github.event_name != 'workflow_dispatch' && github.event_name != 'schedule'
        run: ./mvnw -B -ntp -nsu -Pcoverage,sbom verify

      - name: Verify release profile
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
        run: ./mvnw -B -ntp -nsu -Pcoverage,release,sbom,reproducible verify

      - name: Upload test and coverage artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-and-coverage-reports
          path: |
            target/bom.json
            api/target/bom.json
            rsql-spi/target/bom.json
            core/target/bom.json
            jpa-validation/target/bom.json
            perplexhub/target/bom.json
            spring-boot-starter/target/bom.json
            api/target/site/jacoco/
            rsql-spi/target/site/jacoco/
            core/target/site/jacoco/
            jpa-validation/target/site/jacoco/
            perplexhub/target/site/jacoco/
            spring-boot-starter/target/site/jacoco/
            integration/target/site/jacoco-aggregate/
            api/target/surefire-reports/
            rsql-spi/target/surefire-reports/
            core/target/surefire-reports/
            jpa-validation/target/surefire-reports/
            perplexhub/target/surefire-reports/
            spring-boot-starter/target/surefire-reports/
            api/target/failsafe-reports/
            rsql-spi/target/failsafe-reports/
            core/target/failsafe-reports/
            jpa-validation/target/failsafe-reports/
            perplexhub/target/failsafe-reports/
            spring-boot-starter/target/failsafe-reports/
            integration/target/surefire-reports/
            integration/target/failsafe-reports/
          if-no-files-found: ignore

      - name: Skip Codecov uploads
        if: ${{ env.CODECOV_TOKEN == '' }}
        run: echo "CODECOV_TOKEN secret is not configured; skipping Codecov uploads."

      - name: Upload coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: integration/target/site/jacoco-aggregate/jacoco.xml
          disable_search: true
          flags: java
          name: java-coverage
          fail_ci_if_error: true

      - name: Upload test results to Codecov
        if: ${{ !cancelled() && env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: api/target/surefire-reports/*.xml,api/target/failsafe-reports/*.xml,rsql-spi/target/surefire-reports/*.xml,rsql-spi/target/failsafe-reports/*.xml,core/target/surefire-reports/*.xml,core/target/failsafe-reports/*.xml,jpa-validation/target/surefire-reports/*.xml,jpa-validation/target/failsafe-reports/*.xml,perplexhub/target/surefire-reports/*.xml,perplexhub/target/failsafe-reports/*.xml,spring-boot-starter/target/surefire-reports/*.xml,spring-boot-starter/target/failsafe-reports/*.xml,integration/target/surefire-reports/*.xml,integration/target/failsafe-reports/*.xml
          disable_search: true
          report_type: test_results
          flags: java
          name: java-tests
          fail_ci_if_error: true

      - name: SonarQube Cloud analysis
        if: ${{ env.SONAR_TOKEN != '' }}
        run: ./mvnw -B -ntp -nsu sonar:sonar

      - name: Skip SonarQube Cloud analysis
        if: ${{ env.SONAR_TOKEN == '' }}
        run: echo "SONAR_TOKEN secret is not configured; skipping SonarQube Cloud analysis."

  compatibility:
    name: Compatibility (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        java: ["17", "21"]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Test
        run: ./mvnw -B -ntp -nsu test
