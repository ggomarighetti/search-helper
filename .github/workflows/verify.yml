name: Verify

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  MAVEN_ARGS: -B -ntp -nsu

jobs:
  verify:
    name: Verify (Java 25)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Verify
        if: github.event_name != 'workflow_dispatch' && github.event_name != 'schedule'
        run: ./mvnw $MAVEN_ARGS verify

      - name: Verify release profile
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
        run: ./mvnw $MAVEN_ARGS -Prelease verify

  compatibility:
    name: Compatibility (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        java: ["17", "21"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Test
        run: ./mvnw $MAVEN_ARGS test
