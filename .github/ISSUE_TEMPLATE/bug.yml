name: Bug report
description: Report a reproducible defect.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not report security vulnerabilities here. Use private vulnerability
        reporting from SECURITY.md.
  - type: input
    id: version
    attributes:
      label: Version and module
      placeholder: "2.0.0, jpa-rsql-search-core"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Java, Spring Boot, Spring Data JPA, Hibernate, and database versions.
    validations:
      required: true
  - type: textarea
    id: reproducer
    attributes:
      label: Minimal reproducer
      description: Provide code or a repository without private data or credentials.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
